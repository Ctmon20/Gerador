<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Achados Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            color: #2d3436; 
        }

        .contact-card { 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 { color: #2d3436; margin-bottom: 5px; font-size: 1.8rem; }
        p.subtitle { color: #636e72; margin-bottom: 30px; font-size: 0.95rem; }
        
        .links-container { display: flex; flex-direction: column; gap: 15px; }

        .link-item { 
            display: flex; 
            align-items: center; 
            padding: 18px 25px; 
            background: #f8f9fa;
            border-radius: 15px;
            text-decoration: none;
            color: #2d3436;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .link-item i { font-size: 1.4rem; width: 35px; color: #ee4d2d; }

        .link-item:hover { 
            background: #ffffff;
            border-color: #ee4d2d;
            color: #ee4d2d;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(238, 77, 45, 0.1);
        }

        .back-link { margin-top: 30px; color: #ee4d2d; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .back-link:hover { text-decoration: underline; }

        footer { margin-top: 40px; font-size: 12px; color: #b2bec3; }
    </style>
</head>
<body>

    <div class="contact-card">
        <h1>Conecte-se Conosco 🚀</h1>
        <p class="subtitle">Escolha o melhor canal para falar com a equipe Achados Tech.</p>

        <div class="links-container">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSf-o3Gs4hmwopwh5bWOoVTSfbNdxKlU1LdM9gZ38SPWrqEebg/viewform?usp=publish-editor" target="_blank" class="link-item">
                <i class="fa-solid fa-file-signature"></i>
                <span>Formulário de Contato</span>
            </a>

            <a href="https://www.instagram.com/ofertasdodiashop1?igsh=M2M1bXRvc3VxZ2oz&utm_source=qr" target="_blank" class="link-item">
                <i class="fa-brands fa-instagram"></i>
                <span>Siga no Instagram</span>
            </a>

            <a href="https://achadostech2026.blogspot.com/" target="_blank" class="link-item">
                <i class="fa-solid fa-laptop-code"></i>
                <span>Visite nosso Blog</span>
            </a>

            <a href="https://www.youtube.com/@C%C3%B3digo_do_Dinheiro-2026" target="_blank" class="link-item">
                <i class="fa-brands fa-youtube"></i>
                <span>Canal Código do Dinheiro</span>
            </a>
        </div>

        <a href="index.html" class="back-link">← Voltar ao Gerador</a>
    </div>

    <footer>
        &copy; 2026 Achados Tech - Todos os direitos reservados.
    </footer>

</body>
</html>
